name: Deploy Hugo site to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25.x"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "0.163.2"
          extended: true

      - name: Install npm dependencies
        run: npm ci

      - name: Build Hugo site
        run: |
          if [ "${GITHUB_REPOSITORY##*/}" = "${GITHUB_REPOSITORY_OWNER}.github.io" ]; then
            HUGO_BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/"
          else
            HUGO_BASE_URL="https://${GITHUB_REPOSITORY_OWNER}.github.io/${GITHUB_REPOSITORY##*/}/"
          fi
          echo "Base URL: ${HUGO_BASE_URL}"
          hugo -b "${HUGO_BASE_URL}"
          npx -y pagefind --site public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
